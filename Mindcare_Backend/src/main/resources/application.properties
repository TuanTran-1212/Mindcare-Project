#========== server config
server.port=8080
spring.application.name=MindcareBE
# CORS configuration
spring.web.cors.allowed-origins=http://localhost:5173
jwt.secret=abcdefghijklmnopqrstuvwxyz123456abcdefghijklmnopqrstuvwxyz123456
jwt.expiration=86400000

#=========== datasourse config
spring.datasource.url=jdbc:mysql://localhost:3306/mindcare
spring.datasource.username=huyhoang
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#=========== JPA/hbernate config
spring.jpa.hibernate.ddl-auto=validate
# CHANGE: Use "create" to auto-create tables on first run, then switch to "update"
# Options: create | update | validate | none

spring.jpa.show-sql=true
# CHANGE: Set to "false" in production to reduce log noise
logging.level.org.springframework.web=DEBUG
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# duong dan tuyet doi den thu muc luu file (tao truoc hoac cho phép tao tu dong)
file.upload-dir=data/uploads/
# Cau h́nh static location de phuc vu file tinh
spring.web.resources.static-locations=classpath:/static/,file:${file.upload-dir}
# kich thuoc file
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html
# API docs path (JSON)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.packagesToScan=com.project.mindcare_backend
springdoc.pathsToMatch=/api/**

# Chi dinh các package de quet
springdoc.packages-to-scan=com.project.mindcare_backend.controller
